<svg viewBox="0 0 600 100" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <rect width="600" height="100" fill="#1a1a2e" rx="6"/>
  <text x="300" y="20" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">State Variable Filter (LPF モード)</text>

  <text x="30" y="60" fill="#5b8dd9" font-size="11">input</text>
  <line x1="80" y1="57" x2="140" y2="57" stroke="#5b8dd9" stroke-width="1.5"/>

  <rect x="140" y="40" width="150" height="35" rx="4" fill="#1a3a2e" stroke="#4a9"/>
  <text x="215" y="55" text-anchor="middle" fill="#4a9" font-size="10">low += f × band</text>
  <text x="215" y="68" text-anchor="middle" fill="#4a9" font-size="9">band += f × high</text>

  <line x1="290" y1="57" x2="340" y2="57" stroke="#4a9" stroke-width="1.5"/>
  <rect x="340" y="44" width="50" height="26" rx="4" fill="#1a3a2e" stroke="#4a9"/>
  <text x="365" y="62" text-anchor="middle" fill="#6fb" font-size="11">low</text>
  <line x1="390" y1="57" x2="440" y2="57" stroke="#4a9" stroke-width="1.5"/>
  <text x="460" y="61" fill="#5bd9d9" font-size="11">output</text>

  <text x="300" y="92" text-anchor="middle" fill="#aaa" font-size="10">f = 2 × sin(π × freq / sampleRate) ── カットオフ周波数を制御</text>
</svg>
