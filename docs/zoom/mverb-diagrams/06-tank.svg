<svg viewBox="0 0 850 480" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <rect width="850" height="480" fill="#1a1a2e" rx="6"/>
  <text x="425" y="25" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">Tank 詳細構造 (交差フィードバック)</text>

  <text x="20" y="125" fill="#c88aef" font-size="11">smearedInput</text>
  <line x1="115" y1="122" x2="140" y2="122" stroke="#c88aef" stroke-width="1.5"/>

  <circle cx="140" cy="122" r="3" fill="#c88aef"/>
  <line x1="140" y1="122" x2="140" y2="80" stroke="#c88aef" stroke-width="1.5"/>
  <line x1="140" y1="122" x2="140" y2="320" stroke="#c88aef" stroke-width="1.5"/>

  <!-- LEFT TANK -->
  <rect x="100" y="42" width="720" height="100" rx="8" fill="#1a1a28" stroke="#5b8dd9" stroke-width="1"/>
  <text x="460" y="56" text-anchor="middle" fill="#5b8dd9" font-size="12" font-weight="bold">Left Tank</text>

  <circle cx="170" cy="80" r="12" fill="none" stroke="#fff"/>
  <text x="170" y="84" text-anchor="middle" fill="#fff" font-size="12">+</text>
  <text x="170" y="56" text-anchor="middle" fill="#ff6b6b" font-size="8">+ prevRight</text>

  <rect x="200" y="68" width="95" height="30" rx="4" fill="#2a1a3a" stroke="#a45bd9"/>
  <text x="248" y="87" text-anchor="middle" fill="#c88aef" font-size="10">AP4T[0]</text>
  <text x="248" y="110" text-anchor="middle" fill="#aaa" font-size="8">20ms (882)</text>

  <rect x="310" y="68" width="95" height="30" rx="4" fill="#1a3a2e" stroke="#4a9"/>
  <text x="358" y="87" text-anchor="middle" fill="#4a9" font-size="10">Delay[0]</text>
  <text x="358" y="110" text-anchor="middle" fill="#aaa" font-size="8">150ms (6615)</text>

  <rect x="420" y="68" width="95" height="30" rx="4" fill="#3a2a1a" stroke="#d9a55b"/>
  <text x="468" y="87" text-anchor="middle" fill="#d9a55b" font-size="10">Damp[0]</text>
  <text x="468" y="110" text-anchor="middle" fill="#aaa" font-size="8">LPF (高域吸収)</text>

  <rect x="530" y="68" width="95" height="30" rx="4" fill="#2a1a3a" stroke="#a45bd9"/>
  <text x="578" y="87" text-anchor="middle" fill="#c88aef" font-size="10">AP4T[1]</text>
  <text x="578" y="110" text-anchor="middle" fill="#aaa" font-size="8">60ms (2646)</text>

  <rect x="640" y="68" width="95" height="30" rx="4" fill="#1a3a2e" stroke="#4a9"/>
  <text x="688" y="87" text-anchor="middle" fill="#4a9" font-size="10">Delay[1]</text>
  <text x="688" y="110" text-anchor="middle" fill="#aaa" font-size="8">120ms (5292)</text>

  <line x1="182" y1="80" x2="200" y2="83" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="295" y1="83" x2="310" y2="83" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="405" y1="83" x2="420" y2="83" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="515" y1="83" x2="530" y2="83" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="625" y1="83" x2="640" y2="83" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>

  <line x1="735" y1="83" x2="780" y2="83" stroke="#5b8dd9" stroke-width="1.5"/>
  <text x="760" y="75" fill="#5b8dd9" font-size="9">leftTank</text>

  <!-- RIGHT TANK -->
  <rect x="100" y="290" width="720" height="100" rx="8" fill="#1a1a28" stroke="#d95b5b" stroke-width="1"/>
  <text x="460" y="304" text-anchor="middle" fill="#d95b5b" font-size="12" font-weight="bold">Right Tank</text>

  <circle cx="170" cy="335" r="12" fill="none" stroke="#fff"/>
  <text x="170" y="339" text-anchor="middle" fill="#fff" font-size="12">+</text>
  <text x="170" y="365" text-anchor="middle" fill="#ff6b6b" font-size="8">+ prevLeft</text>

  <rect x="200" y="320" width="95" height="30" rx="4" fill="#2a1a3a" stroke="#a45bd9"/>
  <text x="248" y="339" text-anchor="middle" fill="#c88aef" font-size="10">AP4T[2]</text>
  <text x="248" y="362" text-anchor="middle" fill="#aaa" font-size="8">30ms (1323)</text>

  <rect x="310" y="320" width="95" height="30" rx="4" fill="#1a3a2e" stroke="#4a9"/>
  <text x="358" y="339" text-anchor="middle" fill="#4a9" font-size="10">Delay[2]</text>
  <text x="358" y="362" text-anchor="middle" fill="#aaa" font-size="8">140ms (6174)</text>

  <rect x="420" y="320" width="95" height="30" rx="4" fill="#3a2a1a" stroke="#d9a55b"/>
  <text x="468" y="339" text-anchor="middle" fill="#d9a55b" font-size="10">Damp[1]</text>
  <text x="468" y="362" text-anchor="middle" fill="#aaa" font-size="8">LPF (高域吸収)</text>

  <rect x="530" y="320" width="95" height="30" rx="4" fill="#2a1a3a" stroke="#a45bd9"/>
  <text x="578" y="339" text-anchor="middle" fill="#c88aef" font-size="10">AP4T[3]</text>
  <text x="578" y="362" text-anchor="middle" fill="#aaa" font-size="8">89ms (3924)</text>

  <rect x="640" y="320" width="95" height="30" rx="4" fill="#1a3a2e" stroke="#4a9"/>
  <text x="688" y="339" text-anchor="middle" fill="#4a9" font-size="10">Delay[3]</text>
  <text x="688" y="362" text-anchor="middle" fill="#aaa" font-size="8">110ms (4851)</text>

  <line x1="182" y1="335" x2="200" y2="335" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="295" y1="335" x2="310" y2="335" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="405" y1="335" x2="420" y2="335" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="515" y1="335" x2="530" y2="335" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="625" y1="335" x2="640" y2="335" stroke="#ccc" stroke-width="1" marker-end="url(#arw)"/>

  <line x1="735" y1="335" x2="780" y2="335" stroke="#d95b5b" stroke-width="1.5"/>
  <text x="756" y="327" fill="#d95b5b" font-size="9">rightTank</text>

  <!-- CROSS FEEDBACK -->
  <path d="M780,83 C820,83 830,200 830,210 C830,220 60,220 60,80 C60,70 158,70 158,76" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arwR)"/>
  <path d="M780,335 C820,335 830,215 830,210 C830,205 60,205 60,335 C60,345 158,345 158,339" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arwR)"/>

  <rect x="810" y="145" width="35" height="18" rx="3" fill="#3a1a1a" stroke="#ff6b6b"/>
  <text x="828" y="158" text-anchor="middle" fill="#ff6b6b" font-size="9">×D</text>
  <rect x="35" y="200" width="35" height="18" rx="3" fill="#3a1a1a" stroke="#ff6b6b"/>
  <text x="53" y="213" text-anchor="middle" fill="#ff6b6b" font-size="9">×D</text>

  <text x="425" y="210" text-anchor="middle" fill="#ff6b6b" font-size="11">D = DecaySmooth (0.005〜0.805)</text>
  <text x="425" y="228" text-anchor="middle" fill="#aaa" font-size="10">交差フィードバック: 左の出力が右の入力へ、右の出力が左の入力へ</text>
  <text x="425" y="245" text-anchor="middle" fill="#aaa" font-size="10">D が 1.0 に近いほど残響が長い。1.0 を超えると発振 (無限リバーブ)</text>

  <text x="425" y="430" text-anchor="middle" fill="#5bd9d9" font-size="11">各 Delay, AP4T の内部タップから信号を取り出して L/R 出力を構成</text>
  <text x="425" y="448" text-anchor="middle" fill="#aaa" font-size="9">右タンクのタップ → L出力、左タンクのタップ → R出力 (交差して自然なステレオ感を実現)</text>

  <defs>
    <marker id="arw" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="none" stroke="#ccc" stroke-width="0.8"/>
    </marker>
    <marker id="arwR" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="none" stroke="#ff6b6b" stroke-width="0.8"/>
    </marker>
  </defs>
</svg>
