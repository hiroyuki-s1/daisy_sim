<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="ex" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#666"/></marker>
    <marker id="ey" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,10 L5,0 L10,10" fill="#666"/></marker>
    <linearGradient id="elecGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="acoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="700" height="340" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#ccc" font-weight="bold" font-size="16">エンベロープ比較</text>

  <!-- Electric guitar -->
  <g transform="translate(40,50)">
    <text x="0" y="0" fill="#4a9eff" font-weight="bold" font-size="14">🎸 エレキギター</text>
    <!-- axes -->
    <line x1="30" y1="120" x2="290" y2="120" stroke="#666" marker-end="url(#ex)"/>
    <line x1="30" y1="120" x2="30" y2="15" stroke="#666" marker-end="url(#ey)"/>
    <text x="290" y="138" fill="#888" font-size="10" text-anchor="end">時間</text>
    <text x="18" y="20" fill="#888" font-size="10">音量</text>
    <!-- envelope curve - long sustain -->
    <path d="M35,120 L38,25 Q45,30 55,40 Q80,55 110,65 Q150,78 200,90 Q250,105 285,115" fill="none" stroke="#4a9eff" stroke-width="3"/>
    <path d="M35,120 L38,25 Q45,30 55,40 Q80,55 110,65 Q150,78 200,90 Q250,105 285,115 L285,120 Z" fill="url(#elecGrad)"/>
    <!-- attack label -->
    <line x1="38" y1="22" x2="38" y2="8" stroke="#ff9e64" stroke-width="1"/>
    <text x="38" y="6" fill="#ff9e64" font-size="10" text-anchor="middle">アタック</text>
    <text x="180" y="78" fill="#4a9eff" font-size="11" opacity="0.7">ゆっくり減衰（サスティン長い）</text>
  </g>

  <!-- Acoustic guitar -->
  <g transform="translate(380,50)">
    <text x="0" y="0" fill="#2ecc71" font-weight="bold" font-size="14">🎵 アコースティックギター</text>
    <!-- axes -->
    <line x1="30" y1="120" x2="290" y2="120" stroke="#666" marker-end="url(#ex)"/>
    <line x1="30" y1="120" x2="30" y2="15" stroke="#666" marker-end="url(#ey)"/>
    <text x="290" y="138" fill="#888" font-size="10" text-anchor="end">時間</text>
    <text x="18" y="20" fill="#888" font-size="10">音量</text>
    <!-- envelope curve - fast decay -->
    <path d="M35,120 L38,22 Q42,30 48,50 Q60,75 80,90 Q110,105 150,113 Q200,118 285,120" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <path d="M35,120 L38,22 Q42,30 48,50 Q60,75 80,90 Q110,105 150,113 Q200,118 285,120 Z" fill="url(#acoGrad)"/>
    <line x1="38" y1="19" x2="38" y2="5" stroke="#ff9e64" stroke-width="1"/>
    <text x="38" y="3" fill="#ff9e64" font-size="10" text-anchor="middle">アタック</text>
    <text x="140" y="78" fill="#2ecc71" font-size="11" opacity="0.7">速く減衰</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40,220)">
    <rect x="0" y="0" width="620" height="100" rx="8" fill="#2a1a3e" stroke="#9b59b6" stroke-width="1" opacity="0.8"/>
    <text x="15" y="25" fill="#9b59b6" font-weight="bold" font-size="13">松プランの「エンベロープ補正」</text>
    <text x="15" y="48" fill="#ccc" font-size="12">エレキのエンベロープを検出 → アコギのカーブに整形し直す</text>
    <!-- mini diagram -->
    <path d="M30,90 L33,65 Q40,70 50,75 Q80,82 120,87 Q160,90 200,90" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <text x="210" y="93" fill="#888" font-size="10">→</text>
    <path d="M230,90 L233,65 Q237,70 240,78 Q250,85 270,88 Q300,90 350,90" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="370" y="93" fill="#2ecc71" font-size="11">アコギ的なカーブに変換</text>
  </g>
</svg>