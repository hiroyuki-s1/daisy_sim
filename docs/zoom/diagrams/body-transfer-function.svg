<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="bx" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#666"/></marker>
    <marker id="by" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,10 L5,0 L10,10" fill="#666"/></marker>
  </defs>

  <rect width="700" height="350" rx="12" fill="#1a1a2e"/>
  <text x="350" y="28" text-anchor="middle" fill="#ccc" font-weight="bold" font-size="16">アコギボディの伝達関数</text>
  <text x="350" y="48" text-anchor="middle" fill="#888" font-size="12">弦の振動（入力）→ [ボディ] → サウンドホールからの音（出力）</text>

  <!-- Main chart area -->
  <g transform="translate(80,65)">
    <!-- axes -->
    <line x1="40" y1="220" x2="560" y2="220" stroke="#666" marker-end="url(#bx)"/>
    <line x1="40" y1="220" x2="40" y2="20" stroke="#666" marker-end="url(#by)"/>

    <!-- Y axis labels -->
    <text x="15" y="25" fill="#888" font-size="11">増幅率</text>
    <text x="15" y="38" fill="#888" font-size="11">(dB)</text>
    <text x="35" y="60" fill="#666" font-size="10" text-anchor="end">+20</text>
    <line x1="37" y1="57" x2="43" y2="57" stroke="#666"/>
    <text x="35" y="100" fill="#666" font-size="10" text-anchor="end">+10</text>
    <line x1="37" y1="97" x2="43" y2="97" stroke="#666"/>
    <text x="35" y="140" fill="#666" font-size="10" text-anchor="end">0</text>
    <line x1="37" y1="137" x2="550" y2="137" stroke="#444" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="35" y="180" fill="#666" font-size="10" text-anchor="end">−10</text>
    <line x1="37" y1="177" x2="43" y2="177" stroke="#666"/>
    <text x="35" y="215" fill="#666" font-size="10" text-anchor="end">−20</text>

    <!-- X axis labels -->
    <text x="70" y="240" fill="#888" font-size="10" text-anchor="middle">50</text>
    <text x="140" y="240" fill="#888" font-size="10" text-anchor="middle">100</text>
    <text x="220" y="240" fill="#888" font-size="10" text-anchor="middle">200</text>
    <text x="300" y="240" fill="#888" font-size="10" text-anchor="middle">500</text>
    <text x="380" y="240" fill="#888" font-size="10" text-anchor="middle">1k</text>
    <text x="450" y="240" fill="#888" font-size="10" text-anchor="middle">2k</text>
    <text x="520" y="240" fill="#888" font-size="10" text-anchor="middle">5k</text>
    <text x="540" y="255" fill="#888" font-size="11" text-anchor="end">周波数 (Hz)</text>

    <!-- Frequency response curve with resonance peaks -->
    <path d="M50,150 Q70,148 90,145
             Q100,120 110,70 Q115,55 120,55 Q125,55 130,70 Q140,120 145,137
             Q155,130 165,100 Q170,85 175,82 Q180,85 185,100 Q195,130 200,137
             Q215,135 225,145 Q230,150 235,155
             Q255,140 265,120 Q270,108 275,105 Q280,108 285,120 Q295,140 300,150
             Q310,155 320,160
             Q340,148 350,135 Q355,125 360,122 Q365,125 370,135 Q380,148 390,155
             Q410,158 430,165
             Q445,155 455,148 Q460,142 465,140 Q470,142 475,148 Q485,155 495,162
             Q510,168 530,175 L540,178"
           fill="none" stroke="#4a9eff" stroke-width="2.5"/>

    <!-- Peak labels -->
    <circle cx="120" cy="55" r="4" fill="#e94560"/>
    <text x="120" y="45" fill="#e94560" font-size="10" text-anchor="middle">★ モード1</text>

    <circle cx="175" cy="82" r="4" fill="#e94560"/>
    <text x="175" y="72" fill="#e94560" font-size="10" text-anchor="middle">★ モード2</text>

    <circle cx="275" cy="105" r="4" fill="#ff9e64"/>
    <text x="275" y="95" fill="#ff9e64" font-size="10" text-anchor="middle">★ モード3</text>

    <circle cx="360" cy="122" r="4" fill="#ff9e64"/>

    <!-- Anti-resonance label -->
    <path d="M230,155 L230,168" stroke="#9b59b6" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="230" y="180" fill="#9b59b6" font-size="9" text-anchor="middle">反共鳴</text>

    <!-- Legend -->
    <rect x="370" y="185" width="170" height="50" rx="6" fill="#222" stroke="#444"/>
    <circle cx="385" cy="200" r="4" fill="#e94560"/>
    <text x="395" y="204" fill="#ccc" font-size="10">共鳴モード (ボディが強く鳴る)</text>
    <text x="385" y="224" fill="#888" font-size="10">★の位置がボディの「性格」を決める</text>
  </g>

  <!-- Body type comparison -->
  <g transform="translate(80,310)">
    <text x="40" y="12" fill="#2ecc71" font-size="11">ドレッドノート → 低域ピーク大 (低音豊か)</text>
    <text x="300" y="12" fill="#ff9e64" font-size="11">パーラー → ピークが高い周波数 (軽やか)</text>
  </g>
</svg>