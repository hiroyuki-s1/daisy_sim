<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrowX" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#666"/></marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,10 L5,0 L10,10" fill="#666"/></marker>
  </defs>

  <!-- Row 1 -->
  <!-- LPF -->
  <g transform="translate(20,20)">
    <rect width="260" height="220" rx="12" fill="#1a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" fill="#4a9eff" font-weight="bold" font-size="15">LPF (ローパス)</text>
    <text x="130" y="48" text-anchor="middle" fill="#888" font-size="11">トーンノブを絞る</text>
    <!-- axes -->
    <line x1="40" y1="180" x2="235" y2="180" stroke="#666" marker-end="url(#arrowX)"/>
    <line x1="40" y1="180" x2="40" y2="60" stroke="#666" marker-end="url(#arrowY)"/>
    <text x="235" y="198" fill="#888" font-size="10" text-anchor="end">周波数</text>
    <text x="28" y="65" fill="#888" font-size="10">dB</text>
    <!-- curve -->
    <path d="M45,90 L120,90 Q150,90 170,130 Q185,160 220,175" fill="none" stroke="#4a9eff" stroke-width="3"/>
    <!-- fc line -->
    <line x1="145" y1="180" x2="145" y2="70" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="145" y="200" fill="#e94560" font-size="10" text-anchor="middle">fc</text>
    <!-- fill area -->
    <path d="M45,90 L120,90 Q150,90 170,130 Q185,160 220,175 L220,180 L45,180 Z" fill="#4a9eff" opacity="0.1"/>
  </g>

  <!-- HPF -->
  <g transform="translate(310,20)">
    <rect width="260" height="220" rx="12" fill="#1a1a2e" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" fill="#2ecc71" font-weight="bold" font-size="15">HPF (ハイパス)</text>
    <text x="130" y="48" text-anchor="middle" fill="#888" font-size="11">ベースカットスイッチ</text>
    <line x1="40" y1="180" x2="235" y2="180" stroke="#666" marker-end="url(#arrowX)"/>
    <line x1="40" y1="180" x2="40" y2="60" stroke="#666" marker-end="url(#arrowY)"/>
    <text x="235" y="198" fill="#888" font-size="10" text-anchor="end">周波数</text>
    <text x="28" y="65" fill="#888" font-size="10">dB</text>
    <path d="M50,175 Q80,160 100,130 Q120,90 145,90 L220,90" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <line x1="120" y1="180" x2="120" y2="70" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="120" y="200" fill="#e94560" font-size="10" text-anchor="middle">fc</text>
    <path d="M50,175 Q80,160 100,130 Q120,90 145,90 L220,90 L220,180 L50,180 Z" fill="#2ecc71" opacity="0.1"/>
  </g>

  <!-- BPF -->
  <g transform="translate(600,20)">
    <rect width="260" height="220" rx="12" fill="#1a1a2e" stroke="#ff9e64" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" fill="#ff9e64" font-weight="bold" font-size="15">BPF (バンドパス)</text>
    <text x="130" y="48" text-anchor="middle" fill="#888" font-size="11">ワウペダル半開き</text>
    <line x1="40" y1="180" x2="235" y2="180" stroke="#666" marker-end="url(#arrowX)"/>
    <line x1="40" y1="180" x2="40" y2="60" stroke="#666" marker-end="url(#arrowY)"/>
    <text x="235" y="198" fill="#888" font-size="10" text-anchor="end">周波数</text>
    <text x="28" y="65" fill="#888" font-size="10">dB</text>
    <path d="M50,175 Q80,165 100,140 Q120,95 130,90 Q140,95 160,140 Q180,165 220,175" fill="none" stroke="#ff9e64" stroke-width="3"/>
    <line x1="130" y1="180" x2="130" y2="70" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="130" y="200" fill="#e94560" font-size="10" text-anchor="middle">fc</text>
    <path d="M50,175 Q80,165 100,140 Q120,95 130,90 Q140,95 160,140 Q180,165 220,175 L220,180 L50,180 Z" fill="#ff9e64" opacity="0.1"/>
  </g>

  <!-- Row 2 -->
  <!-- Peaking -->
  <g transform="translate(20,280)">
    <rect width="260" height="220" rx="12" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" fill="#e94560" font-weight="bold" font-size="15">ピーキング (Bell)</text>
    <text x="130" y="48" text-anchor="middle" fill="#888" font-size="11">パラメトリックEQ</text>
    <line x1="40" y1="180" x2="235" y2="180" stroke="#666" marker-end="url(#arrowX)"/>
    <line x1="40" y1="180" x2="40" y2="60" stroke="#666" marker-end="url(#arrowY)"/>
    <text x="235" y="198" fill="#888" font-size="10" text-anchor="end">周波数</text>
    <text x="28" y="65" fill="#888" font-size="10">dB</text>
    <!-- 0dB reference -->
    <line x1="40" y1="135" x2="230" y2="135" stroke="#444" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="35" y="138" fill="#666" font-size="9" text-anchor="end">0</text>
    <!-- boost curve -->
    <path d="M50,135 Q90,135 110,110 Q120,85 130,80 Q140,85 150,110 Q170,135 220,135" fill="none" stroke="#e94560" stroke-width="3"/>
    <!-- cut curve (dashed) -->
    <path d="M50,135 Q90,135 110,155 Q120,170 130,175 Q140,170 150,155 Q170,135 220,135" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
    <text x="130" y="72" fill="#2ecc71" font-size="10" text-anchor="middle">+dB ブースト</text>
    <text x="130" y="198" fill="#888" font-size="10" text-anchor="middle">−dB カット</text>
  </g>

  <!-- Shelf -->
  <g transform="translate(310,280)">
    <rect width="260" height="220" rx="12" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" fill="#9b59b6" font-weight="bold" font-size="15">シェルフ</text>
    <text x="130" y="48" text-anchor="middle" fill="#888" font-size="11">Treble / Bass ノブ</text>
    <line x1="40" y1="180" x2="235" y2="180" stroke="#666" marker-end="url(#arrowX)"/>
    <line x1="40" y1="180" x2="40" y2="60" stroke="#666" marker-end="url(#arrowY)"/>
    <text x="235" y="198" fill="#888" font-size="10" text-anchor="end">周波数</text>
    <text x="28" y="65" fill="#888" font-size="10">dB</text>
    <line x1="40" y1="135" x2="230" y2="135" stroke="#444" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="35" y="138" fill="#666" font-size="9" text-anchor="end">0</text>
    <!-- high shelf boost -->
    <path d="M50,135 L100,135 Q130,135 150,100 L220,100" fill="none" stroke="#9b59b6" stroke-width="3"/>
    <path d="M50,135 L100,135 Q130,135 150,100 L220,100 L220,135 L50,135 Z" fill="#9b59b6" opacity="0.1"/>
    <!-- low shelf boost (dashed) -->
    <path d="M50,100 L110,100 Q130,100 150,135 L220,135" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,3" opacity="0.6"/>
    <text x="200" y="95" fill="#9b59b6" font-size="10" text-anchor="middle">Hi Shelf</text>
    <text x="70" y="95" fill="#9b59b6" font-size="10" text-anchor="middle" opacity="0.6">Lo Shelf</text>
  </g>

  <!-- Notch -->
  <g transform="translate(600,280)">
    <rect width="260" height="220" rx="12" fill="#1a1a2e" stroke="#f1c40f" stroke-width="1.5"/>
    <text x="130" y="30" text-anchor="middle" fill="#f1c40f" font-weight="bold" font-size="15">ノッチ</text>
    <text x="130" y="48" text-anchor="middle" fill="#888" font-size="11">ハウリングサプレッサー</text>
    <line x1="40" y1="180" x2="235" y2="180" stroke="#666" marker-end="url(#arrowX)"/>
    <line x1="40" y1="180" x2="40" y2="60" stroke="#666" marker-end="url(#arrowY)"/>
    <text x="235" y="198" fill="#888" font-size="10" text-anchor="end">周波数</text>
    <text x="28" y="65" fill="#888" font-size="10">dB</text>
    <line x1="40" y1="95" x2="230" y2="95" stroke="#444" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="35" y="98" fill="#666" font-size="9" text-anchor="end">0</text>
    <!-- notch curve -->
    <path d="M50,95 L105,95 Q120,95 125,130 Q128,160 130,175 Q132,160 135,130 Q140,95 155,95 L220,95" fill="none" stroke="#f1c40f" stroke-width="3"/>
    <line x1="130" y1="65" x2="130" y2="175" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="130" y="208" fill="#e94560" font-size="10" text-anchor="middle">ピンポイント除去</text>
  </g>
</svg>