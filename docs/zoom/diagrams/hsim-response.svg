<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="hx" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#666"/></marker>
    <marker id="hy" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,10 L5,0 L10,10" fill="#666"/></marker>
  </defs>

  <rect width="600" height="260" rx="12" fill="#1a1a2e"/>
  <text x="300" y="25" text-anchor="middle" fill="#e94560" font-weight="bold" font-size="15">H_sim(f) の周波数特性 — 「正解の形」</text>

  <g transform="translate(60,40)">
    <!-- axes -->
    <line x1="40" y1="175" x2="480" y2="175" stroke="#666" marker-end="url(#hx)"/>
    <line x1="40" y1="175" x2="40" y2="20" stroke="#666" marker-end="url(#hy)"/>
    <text x="15" y="30" fill="#888" font-size="11">増幅率</text>
    <text x="480" y="195" fill="#888" font-size="11" text-anchor="end">周波数</text>

    <!-- 0dB line -->
    <line x1="40" y1="110" x2="470" y2="110" stroke="#444" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="35" y="113" fill="#666" font-size="9" text-anchor="end">0dB</text>

    <!-- H_sim curve: low body resonance peaks + high frequency rolloff -->
    <path d="M50,120 Q60,115 70,105
             Q80,70 90,45 Q95,35 100,35 Q105,35 110,45 Q120,80 125,105
             Q130,100 140,80 Q145,65 150,60 Q155,65 160,80 Q170,100 175,108
             Q190,105 200,95 Q205,85 210,80 Q215,85 220,95 Q230,108 240,112
             Q280,110 310,115 Q350,125 400,145 Q440,165 470,172"
           fill="none" stroke="#e94560" stroke-width="3"/>

    <!-- fill below curve to 0dB in low freq area -->
    <path d="M50,120 Q60,115 70,105
             Q80,70 90,45 Q95,35 100,35 Q105,35 110,45 Q120,80 125,105
             Q130,100 140,80 Q145,65 150,60 Q155,65 160,80 Q170,100 175,108
             Q190,105 200,95 Q205,85 210,80 Q215,85 220,95 Q230,108 240,112
             L240,175 L50,175 Z" fill="#e94560" opacity="0.08"/>

    <!-- Resonance peak markers -->
    <circle cx="100" cy="35" r="5" fill="#e94560"/>
    <text x="100" y="25" fill="#e94560" font-size="10" text-anchor="middle" font-weight="bold">★</text>
    <circle cx="150" cy="60" r="5" fill="#e94560"/>
    <text x="150" y="50" fill="#e94560" font-size="10" text-anchor="middle" font-weight="bold">★</text>
    <circle cx="210" cy="80" r="5" fill="#ff9e64"/>
    <text x="210" y="70" fill="#ff9e64" font-size="10" text-anchor="middle" font-weight="bold">★</text>

    <!-- High freq rolloff annotation -->
    <path d="M350,125 L380,100" stroke="#9b59b6" stroke-width="1"/>
    <text x="385" y="95" fill="#9b59b6" font-size="10">高域は下がる</text>
    <text x="385" y="108" fill="#9b59b6" font-size="9">(PU補正 + ボディ高域減衰)</text>

    <!-- Low freq annotation -->
    <path d="M100,40 L60,55" stroke="#2ecc71" stroke-width="1"/>
    <text x="15" y="55" fill="#2ecc71" font-size="10">ボディ共鳴</text>
    <text x="15" y="68" fill="#2ecc71" font-size="10">ピーク</text>
  </g>
</svg>